<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BhoomiSetu</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'DM Sans',sans-serif;
  background:#ffffff;
  color:#1f2937;
  scroll-behavior:smooth;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  text-align:center;
}

.logo{
  height:60vh;
  max-height:520px;
  width:auto;
  margin-bottom:20px;
}


.input-box{
  width:100%;
  max-width:350px;
  padding:14px;
  border-radius:14px;
  border:1px solid #ddd;
  margin-bottom:12px;
  font-size:14px;
}

.btn{
  width:100%;
  max-width:350px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
  font-size:15px;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(34,197,94,0.3);
}


.footer{
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#6b7280;
  border-top:1px solid #eee;
  margin-top:0.20px;
}

</style>
</head>

<body>

<section class="hero">
  <img src="Icon/Logo01.png" class="logo">

  <input type="email" placeholder="Enter your email address" class="input-box">
  <button class="btn">Get Started</button>
</section>


<div class="footer">
  © 2026 BhoomiSetu — Rooted in the earth, moving toward the future. All rights reserved.
</div>

</body>
</html>
