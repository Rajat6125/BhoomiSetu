<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BhoomiSetu – Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brand: #e05a40;
    --brand-light: #f08060;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-y: auto;
  }

  /* ── Phone Shell ── */
  .phone {
    width: 100%;
    min-height: 100vh;
    max-height: 100vh;
    max-height: 844px;
    background: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,0.7);
  }
  

  /* ── Hero ── */
  .hero-bg {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 36%;
    overflow: hidden;
    z-index: 0;
  }
  .hero-bg img {
    width: 100%; height: 115%;
    object-fit: cover; object-position: center 30%;
    display: block;
    filter: brightness(0.70) saturate(1.15);
    transform-origin: center;
    animation: subtle-zoom 14s ease-in-out infinite alternate;
  }
  @keyframes subtle-zoom {
    from { transform: scale(1);    }
    to   { transform: scale(1.07); }
  }
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(160deg, rgba(18,45,18,0.6) 0%, rgba(0,0,0,0.05) 70%, transparent 100%);
  }

  /* ── Logo ── */
  .logo {
    position: absolute;
    top: 16px; left: 18px;
    z-index: 4;
    display: flex; align-items: center; gap: 8px;
  }
  .logo img {
    height: 74px; width: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }
  .logo-fallback {
    font-family: 'Sora', sans-serif;
    font-size: 17px; font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    display: none;
  }

  /* ── Wave — sits right at the top edge of .card ── */
  .wave-wrap {
    position: absolute;
    left: 0; right: 0;
    /* bottom of hero = 36% of phone height; card top = 34%; wave bridges the gap */
    bottom: calc(64% - 2px);
    z-index: 2;
    line-height: 0;   /* remove any inline gap under SVG */
  }
  .wave-wrap svg {
    display: block;
    width: 100%;
    height: 52px;
  }

  /* ── Card ── */
  .card {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 64%;
    background: #fff;
    border-radius: 26px 26px 0 0;
    padding: 18px 22px 14px;
    z-index: 3;
    display: flex;
    flex-direction: column;
  }

  /* dot-grid texture */
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, #d8d8d8 1px, transparent 1px);
    background-size: 20px 20px;
    opacity: 0.28;
    border-radius: 26px 26px 0 0;
    pointer-events: none;
    z-index: 0;
  }
  .card > * { position: relative; z-index: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-header h2 {
    font-family: 'Sora', sans-serif;
    font-size: 26px; font-weight: 700;
    color: #111; letter-spacing: -0.4px;
    line-height: 1.15;
  }
  
  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px 14px;
    flex: 1;
  }
  .field { display: flex; flex-direction: column; gap: 2px; }
  .field.full { grid-column: 1 / -1; }

  .field-label {
    font-size: 9.5px; font-weight: 700;
    color: #7a7270;           /* was #b8b0b0 — too light */
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .input-wrap {
    display: flex; align-items: center; gap: 6px;
    border-bottom: 1.5px solid #ddd;  /* was #ebebeb — slightly more visible */
    padding: 5px 1px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-bottom-color: var(--brand); }


  .input-wrap svg { flex-shrink: 0; color: #8b8282; transition: color 0.2s; }
  .input-wrap:focus-within svg { color: var(--brand); }

  .input-wrap input {
    flex: 1; border: none; outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: #1a1a1a;
    background: transparent; width: 100%;
  }

  .input-wrap input::placeholder {
    color: #8d8a8a;         
    font-size: 12.5px;
  }

  .eye-btn {
    background: none; border: none; cursor: pointer;
    color: #000000; display: flex; padding: 0;
    transition: color 0.2s; flex-shrink: 0;
  }
  .eye-btn:hover { color: var(--brand); }

  .field-error {
    font-size: 9px; color: var(--brand);
    font-weight: 700; display: none;
    line-height: 1.2;
  }
  .field-error.show { display: block; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #e0e0e0 20%, #e0e0e0 80%, transparent);
    margin: 10px 0 8px;
    flex-shrink: 0;
  }

  .cta-row {
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  bottom: 0;
  background: #fff;
  padding-top: 10px;
}

  .signup-btn {
    flex: 1; padding: 13px 10px;
    border: none; border-radius: 13px;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-light) 100%);
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.05em; cursor: pointer;
    box-shadow: 0 8px 22px rgba(224,90,64,0.38);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    overflow: hidden; position: relative;
    min-width: 0;
  }
  .signup-btn::after {
    content: '';
    position: absolute; top: 0; left: -80%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
    transform: skewX(-15deg);
    transition: left 0.5s ease;
  }
  .signup-btn:hover::after { left: 130%; }
  .signup-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 26px rgba(224,90,64,0.46); }
  .signup-btn:active { transform: translateY(0); }
  .signup-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .signin-link {
    font-size: 11.5px; color: #999;
    text-align: center; flex-shrink: 0;
  }
  .signin-link a {
    display: block; margin-top: 2px;
    color: var(--brand); font-weight: 700;
    text-decoration: none; font-size: 12px;
  }
  .signin-link a:hover { text-decoration: underline; }

  .toast {
    position: fixed; bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    padding: 10px 20px; border-radius: 40px;
    font-size: 12px; font-weight: 600;
    color: #fff; white-space: nowrap;
    z-index: 999; opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: #2c7a4a; }
  .toast.error   { background: #c0392b; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 5px;
  }
 @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fields-grid .field { animation: fadeUp 0.3s ease both; }
  .fields-grid .field:nth-child(1) { animation-delay: 0.06s; }
  .fields-grid .field:nth-child(2) { animation-delay: 0.10s; }
  .fields-grid .field:nth-child(3) { animation-delay: 0.14s; }
  .fields-grid .field:nth-child(4) { animation-delay: 0.17s; }
  .fields-grid .field:nth-child(5) { animation-delay: 0.20s; }
  .fields-grid .field:nth-child(6) { animation-delay: 0.23s; }
  .fields-grid .field:nth-child(7) { animation-delay: 0.26s; }


  @media (max-height: 700px) {
  .card {
    max-height: none;
    height: auto;
    overflow-y: auto;
    padding-bottom: 30px;
  }

  .phone {
    overflow-y: auto;
  }
}
</style>
</head>
<body>

<div class="phone">

  <!-- Hero image -->
  <div class="hero-bg">
    <img src="Pic/Back_2.jpg" alt="Farm" id="bgImg">
  </div>

  <div class="logo">
    <img src="Icon/Logo.png" alt="BhoomiSetu" id="logoImg">
    <span class="logo-fallback" id="logoFallback">BhoomiSetu</span>
  </div>

  <div class="wave-wrap">
    <svg viewBox="0 0 390 52" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <!-- white fill that flows down into the card -->
      <path d="M0,52 L0,30 Q65,4 130,20 Q195,36 260,16 Q325,-4 390,24 L390,52 Z" fill="#ffffff"/>
    </svg>
  </div>

  <div class="card">

    <div class="card-header">
      <h2>Create Account
        
      </h2>
    </div>

    <div class="fields-grid">

      <div class="field full">
        <div class="field-label">Full Name</div>
        <div class="input-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="fullName" placeholder="Your full name" autocomplete="name">
        </div>
        <span class="field-error" id="err-name"></span>
      </div>

      <div class="field full">
        <div class="field-label">Phone or Email</div>
        <div class="input-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="text" id="phoneEmail" placeholder="Phone number or email" autocomplete="username">
        </div>
        <span class="field-error" id="err-phone"></span>
      </div>
    <div class="field">
        <div class="field-label">Password</div>
        <div class="input-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="pwd1" placeholder="Create password" autocomplete="new-password">
          <button class="eye-btn" type="button" onclick="togglePwd('pwd1',this)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="field-error" id="err-pwd"></span>
      </div>

      <div class="field">
        <div class="field-label">Confirm Password</div>
        <div class="input-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="pwd2" placeholder="Confirm password" autocomplete="new-password">
          <button class="eye-btn" type="button" onclick="togglePwd('pwd2',this)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="field-error" id="err-pwd2"></span>
      </div>

      <div class="field">
        <div class="field-label">Location</div>
        <div class="input-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <input type="text" id="location" placeholder="Village / District">
        </div>
        <span class="field-error" id="err-location"></span>
      </div>

      <div class="field">
        <div class="field-label">Farm Size (acres)</div>
        <div class="input-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <input type="number" step="0.1" min="0.1" id="farmSize" placeholder="e.g. 2.5">
        </div>
        <span class="field-error" id="err-farm"></span>
      </div>

      <div class="field full">
        <div class="field-label">Primary Crop</div>
        <div class="input-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 0 1 0 20M12 2a10 10 0 0 0 0 20M2 12h20"/></svg>
          <input type="text" id="primaryCrop" placeholder="e.g. Wheat, Rice, Cotton">
        </div>
        <span class="field-error" id="err-crop"></span>
      </div>

    </div>

    <div class="divider"></div>

    <div class="cta-row">
      <button class="signup-btn" id="signupBtn" onclick="handleSignup()">Sign Up</button>
      <div class="signin-link">
        Have account?
        <a href="login.html">Sign in →</a>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API_BASE = "https://bhoomisetu-t4nw.onrender.com"; 

  document.getElementById('bgImg').onerror = function() {
    this.src = 'https://images.pexels.com/photos/1595108/pexels-photo-1595108.jpeg?auto=compress&cs=tinysrgb&w=600';
  };
  document.getElementById('logoImg').onerror = function() {
    this.style.display = 'none';
    document.getElementById('logoFallback').style.display = 'block';
  };

  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.style.opacity = inp.type === 'text' ? '0.4' : '1';
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => { t.className = 'toast'; }, 3500);
  }

  function setError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.toggle('show', !!msg);
  }
  function clearAllErrors() {
    ['err-name','err-phone','err-pwd','err-pwd2','err-location','err-farm','err-crop']
      .forEach(id => setError(id, ''));
  }

  function validate(d) {
    let ok = true;
    if (!d.name || d.name.length < 2)              { setError('err-name',     'Min 2 chars');    ok = false; }
    if (!d.phone_email || d.phone_email.length < 3) { setError('err-phone',   'Required');       ok = false; }
    if (!d.password || d.password.length < 4)       { setError('err-pwd',     'Min 4 chars');    ok = false; }
    if (d.password !== d.confirmPassword)            { setError('err-pwd2',   "Doesn't match");  ok = false; }
    if (!d.location || d.location.length < 2)       { setError('err-location','Required');       ok = false; }
    if (!d.farm_size || parseFloat(d.farm_size) <= 0){ setError('err-farm',   'Must be > 0');    ok = false; }
    if (!d.primary_crop || d.primary_crop.length < 2){ setError('err-crop',   'Required');       ok = false; }
    return ok;
  }

  function setLoading(on) {
    const btn = document.getElementById('signupBtn');
    btn.disabled = on;
    btn.innerHTML = on ? '<span class="spinner"></span>Creating…' : 'Sign Up';
  }

  async function handleSignup() {
    clearAllErrors();

    const payload = {
      name:            document.getElementById('fullName').value.trim(),
      phone_email:     document.getElementById('phoneEmail').value.trim(),
      password:        document.getElementById('pwd1').value,
      confirmPassword: document.getElementById('pwd2').value,
      location:        document.getElementById('location').value.trim(),
      farm_size:       document.getElementById('farmSize').value,
      primary_crop:    document.getElementById('primaryCrop').value.trim(),
    };

    if (!validate(payload)) return;
    setLoading(true);

    const { confirmPassword, ...body } = payload;

    try {
      const res  = await fetch(`${API_BASE}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();

      if (res.status === 201 && data.success) {
        showToast('Account created! Redirecting…', 'success');
        setTimeout(() => { window.location.href="login.html"; }, 1800);
      } else if (res.status === 409) {
        setError('err-phone', 'Account already exists');
        showToast('User already exists — please sign in.', 'error');
      } else if (res.status === 400) {
        showToast(data.message || 'Fill all fields correctly.', 'error');
      } else {
        showToast(data.message || data.error || 'Registration failed.', 'error');
      }
    } catch (err) {
      console.error(err);
      showToast('Network error — is the server running?', 'error');
    } finally {
      setLoading(false);
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
  (function prefillRegister() {
  // get value saved from landing page
  const fromLanding = localStorage.getItem('phone_email');

  // optional fallback (if user came from login page)
  const existingUser =
    localStorage.getItem('bhoomisetu_user') ||
    sessionStorage.getItem('bhoomisetu_user');

  const value = fromLanding || existingUser;

  if (value) {
    document.getElementById('phoneEmail').value = value;

    // optional: clear after using (recommended)
    localStorage.removeItem('phone_email');
  }
})();
</script>
</body>
</html>
